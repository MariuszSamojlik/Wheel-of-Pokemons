<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Pokemons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .pokemon-bg {
            position: fixed;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            filter: brightness(1.2);
        }

        .pokemon-bg img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .sidebar {
            width: 250px;
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            height: fit-content;
        }

        .sidebar h2 {
            margin-bottom: 15px;
            color: #333;
            font-size: 20px;
        }

        .person-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .person-item:hover {
            background: #e0e0e0;
        }

        .person-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .group-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }

        .group-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: #e8e8e8;
            color: #555;
            transition: all 0.2s;
            user-select: none;
            white-space: nowrap;
        }

        .group-pill:hover {
            background: #d0d0d0;
        }

        .group-pill.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            margin-bottom: 8px;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .bulk-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .bulk-btn {
            flex: 1;
            padding: 5px 4px;
            font-size: 11px;
            font-weight: 600;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            background: white;
            color: #555;
            transition: all 0.2s;
        }

        .bulk-btn:hover {
            background: #f0f0f0;
            border-color: #aaa;
        }

        .no-results {
            color: #aaa;
            font-size: 13px;
            padding: 8px 0;
            text-align: center;
        }

        .admin-link {
            position: fixed;
            top: 14px;
            right: 16px;
            width: 38px;
            height: 38px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-decoration: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: background 0.2s;
            z-index: 10;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.32);
        }

        .main-content {
            flex: 1;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 42px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .pokemon-card {
            background: linear-gradient(135deg, #f9d97f 0%, #f5c563 50%, #f9d97f 100%);
            border-radius: 15px;
            padding: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .pokemon-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 15px;
            padding: 3px;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .card-hp {
            font-size: 16px;
            font-weight: bold;
            color: #e74c3c;
        }

        .card-image {
            width: 100%;
            height: 160px;
            background: white;
            border: 3px solid #333;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .card-ability {
            background: rgba(255, 255, 255, 0.7);
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .ability-name {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .ability-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.3;
        }

        .card-stats {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .stat-badge {
            background: #3498db;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .card-footer {
            font-size: 10px;
            color: #666;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 6px;
        }

        .pick-button-container {
            text-align: center;
            margin-top: 20px;
            padding-bottom: 30px;
        }

        .pick-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .pick-button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .pick-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Shiny effects */
        .shiny {
            animation: shinyPulse 1s ease-in-out infinite;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%) !important;
        }

        .shiny .card-image {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
            position: relative;
            border-color: #ffd700;
        }

        .shiny::before {
            opacity: 1;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
        }

        @keyframes shinyPulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.6),
                            0 0 40px rgba(255, 215, 0, 0.4),
                            0 0 60px rgba(255, 215, 0, 0.2);
            }
            50% { 
                box-shadow: 0 0 30px rgba(255, 215, 0, 0.8),
                            0 0 60px rgba(255, 215, 0, 0.6),
                            0 0 90px rgba(255, 215, 0, 0.4);
            }
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8);
            animation: sparkleAnimation 1s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sparkleAnimation {
            0%, 100% { 
                opacity: 0;
                transform: scale(0);
            }
            50% { 
                opacity: 1;
                transform: scale(1.5);
            }
        }

        /* Rolling animation */
        .rolling {
            animation: roll 0.3s ease-in-out;
        }

        @keyframes roll {
            0%, 100% { 
                transform: scale(1) rotate(0deg);
            }
            25% { 
                transform: scale(0.9) rotate(-5deg);
            }
            75% { 
                transform: scale(1.1) rotate(5deg);
            }
        }


        .winner-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(42, 16, 74, 0.55) 0%, rgba(8, 6, 22, 0.9) 65%, rgba(0, 0, 0, 0.96) 100%);
            backdrop-filter: blur(8px);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            overflow: hidden;
        }

        .winner-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .winner-stage {
            position: relative;
            width: min(760px, calc(100vw - 32px));
            min-height: 440px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pokeball-throw {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ff4d4d 0 48%, #1d1d1d 48% 52%, #ffffff 52% 100%);
            border: 6px solid #111;
            box-shadow: 0 18px 40px rgba(0,0,0,0.45);
            left: -160px;
            top: 55%;
            transform: translateY(-50%);
            opacity: 0;
        }

        .pokeball-throw::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 28px;
            height: 28px;
            transform: translate(-50%, -50%);
            background: white;
            border: 5px solid #111;
            border-radius: 50%;
            z-index: 2;
        }

        .pokeball-throw::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 8px;
            transform: translateY(-50%);
            background: #111;
        }

        .winner-overlay.throwing .pokeball-throw {
            opacity: 1;
            animation: pokeballThrow 1s cubic-bezier(.22,.88,.27,1.02) forwards;
        }

        @keyframes pokeballThrow {
            0% {
                left: -160px;
                top: 72%;
                transform: translateY(-50%) scale(0.7) rotate(0deg);
            }
            45% {
                left: 34%;
                top: 22%;
                transform: translateY(-50%) scale(0.95) rotate(450deg);
            }
            72% {
                left: 54%;
                top: 58%;
                transform: translateY(-50%) scale(1.06) rotate(780deg);
            }
            100% {
                left: calc(50% - 55px);
                top: 50%;
                transform: translateY(-50%) scale(1) rotate(900deg);
            }
        }

        .impact-burst {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 0 rgba(255,255,255,0.9);
            opacity: 0;
            transform: scale(0.2);
        }

        .winner-overlay.reveal .impact-burst {
            animation: burstFlash 0.6s ease-out forwards;
        }

        @keyframes burstFlash {
            0% { opacity: 1; transform: scale(0.2); box-shadow: 0 0 0 0 rgba(255,255,255,0.95); }
            100% { opacity: 0; transform: scale(14); box-shadow: 0 0 0 48px rgba(255,255,255,0); }
        }

        .winner-card {
            position: relative;
            z-index: 2;
            width: min(560px, 92vw);
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,244,255,0.95));
            border-radius: 28px;
            padding: 18px 18px 20px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.45);
            text-align: center;
            transform: scale(0.84);
            opacity: 0;
            transition: transform 0.35s ease, opacity 0.35s ease;
        }

        .winner-overlay.reveal .winner-card {
            transform: scale(1);
            opacity: 1;
        }

        .winner-media {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #111827, #2a2f45);
            border-radius: 22px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #f2c94c;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.08);
            margin-bottom: 16px;
        }

        .winner-media img,
        .winner-media video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .winner-kicker {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #e74c3c;
            margin-bottom: 8px;
        }

        .winner-name {
            font-size: clamp(34px, 6vw, 58px);
            font-weight: 900;
            color: #222;
            margin-bottom: 8px;
            text-shadow: 0 4px 18px rgba(255,255,255,0.35);
        }

        .winner-subtitle {
            font-size: 18px;
            color: #4b5563;
            margin-bottom: 16px;
        }

        .winner-close {
            border: none;
            background: linear-gradient(135deg, #ef4444, #ec4899);
            color: white;
            padding: 12px 22px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 25px rgba(236,72,153,0.28);
        }

        .winner-close:hover {
            transform: translateY(-1px);
        }

        .pokemon-confetti {
            position: absolute;
            inset: 0;
            z-index: 4;
            pointer-events: none;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            top: -14vh;
            opacity: 0;
            will-change: transform, opacity;
            filter: drop-shadow(0 10px 16px rgba(0,0,0,0.28));
        }

        .confetti-piece img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
        }

        .winner-overlay.reveal .confetti-piece {
            opacity: 1;
            animation: confettiFall var(--fall-duration, 4.4s) linear forwards;
            animation-delay: var(--fall-delay, 0s);
        }

        @keyframes confettiFall {
            0% {
                transform: translate3d(0, -16vh, 0) rotate(0deg) scale(var(--confetti-scale, 1));
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translate3d(var(--drift-x, 0px), 120vh, 0) rotate(var(--spin, 540deg)) scale(var(--confetti-scale, 1));
                opacity: 1;
            }
        }

    </style>
</head>
<body>
    <a href="admin.html" class="admin-link" title="Admin Panel">⚙️</a>
    <div class="container">
        <div class="sidebar">
            <h2>👥 Team Members</h2>
            <div class="group-filters" id="groupFilters"></div>
            <input type="text" class="search-input" id="personSearch" placeholder="🔍 Search...">
            <div class="bulk-actions">
                <button class="bulk-btn" id="selectAllVisible">Select all</button>
                <button class="bulk-btn" id="deselectAllVisible">Deselect all</button>
            </div>
            <div id="personList"></div>
        </div>

        <div class="main-content">
            <h1>Wheel of Pokemons</h1>
            <div class="cards-container" id="cardsContainer"></div>
            <div class="pick-button-container">
                <button class="pick-button" id="pickButton">
                    Throw Pokéball!
                </button>
            </div>
        </div>
    </div>



    <div class="winner-overlay" id="winnerOverlay" aria-hidden="true">
        <div class="winner-stage">
            <div class="pokemon-confetti" id="pokemonConfetti"></div>
            <div class="impact-burst"></div>
            <div class="pokeball-throw"></div>
            <div class="winner-card">
                <div class="winner-media" id="winnerMedia"></div>
                <div class="winner-kicker">A Wild Challenger Appeared!</div>
                <div class="winner-name" id="winnerName"></div>
                <div class="winner-subtitle">Your moment has come. Step into the arena.</div>
                <button class="winner-close" id="winnerClose">Close reveal</button>
            </div>
        </div>
    </div>

    <script>
        // People and groups are loaded dynamically from config.json (managed via admin panel)
        let TEAM_GROUPS = {};
        let PEOPLE_DATA = [];

        const _DEFAULT_PEOPLE = ['Ankit', 'Danny', 'Marian', 'Mariusz', 'Minesh', 'Muhammad', 'Paul', 'Deepthi', 'Rares', 'Yasmin', 'Francois', 'Eric', 'Alex'];
        const _DEFAULT_GROUPS = {
            ContentApp: ['Ankit', 'Danny', 'Marian', 'Mariusz'],
            Headlines: ['Minesh', 'Muhammad', 'Paul'],
            Quicksilver: ['Deepthi', 'Rares', 'Yasmin'],
            Centris: ['Francois', 'Eric', 'Alex'],
        };

        const ABILITIES = [
            { name: 'Regex Tamer', desc: 'Crafts regexes that only aliens understand.' },
            { name: 'Android Emulator Summoner', desc: 'Boots emulator in under 2 minutes. It\'s dark magic.' },
            { name: 'Dark Mode Mastery', desc: 'Only codes after sunset. Moon-powered productivity.' },
            { name: 'Jira Magician', desc: 'Closes tickets with no actual work done. It\'s art.' },
            { name: 'Silent Keyboard Smasher', desc: 'Types furiously. Solves everything. Nobody hears them.' },
            { name: 'Git Rebase Whisperer', desc: 'Somehow keeps a clean history. At what cost?' },
            { name: 'Stack Overflow Summoner', desc: 'Copy-pastes with confidence. It always works.' },
            { name: 'Merge Conflict Resolver', desc: 'Fixes merge conflicts before they even happen.' },
            { name: 'CSS Flexbox Bender', desc: 'Centers a div on the first try. Legendary.' },
            { name: 'Production Hotfixer', desc: 'Deploys on Friday at 5PM. Lives dangerously.' },
            { name: 'Code Review Ninja', desc: 'Spots bugs with eyes closed. Approves in milliseconds.' },
            { name: 'Legacy Code Archaeologist', desc: 'Deciphers code from 2003. No documentation needed.' },
            { name: 'Kubernetes Wrangler', desc: 'Tames pods like wild horses. Clusters fear them.' },
            { name: 'TypeScript Enforcer', desc: 'Types everything. Even comments are typed.' },
            { name: 'Bug Hunter Supreme', desc: 'Finds bugs that don\'t exist yet.' },
            { name: 'Caffeine-Powered Coder', desc: 'Runs on coffee and Stack Overflow tabs.' }
        ];

        const BONUSES = [
            'Hotfix Friday 5PM – 🔥🙏',
            'Add Dark Mode – 🌙',
            'Remove Dead Code – ✂️',
            'Disable Linter – 🚫',
            'Add Comments – 💬',
            'Refactor Everything – 🔄',
            'Skip Code Review – ⚡',
            'Auto-merge PRs – 🤖',
            'Delete Tests – 💥',
            'Ship It Now – 🚀',
            'Works On My Machine – 💻',
            'Force Push Master – 🎯',
            'Blame Previous Dev – 👻',
            'Add More Logging – 📝'
        ];

        const BLOCKERS = [
            'Legacy Code ×3',
            'Meetings ×2',
            'VPN Issues ×∞',
            'Unclear Requirements ×2',
            'Weird QA Feedback ×3',
            'Slack Notifications ×999+',
            'App Crash on Fridays ×2',
            'Merge Conflicts ×1M',
            'Flaky Tests ×5',
            'Missing Documentation ×10',
            'Prod is Down ×1',
            'Outdated Dependencies ×99',
            'Memory Leaks ×7',
            'API Rate Limits ×50',
            'Circular Dependencies ×4',
            'Code Freezes ×2',
            'Build Times ×30min'
        ];

        const ESCAPES = [
            'On PTO (Pretending To Organize)',
            'Mic Muted \'By Mistake\'',
            'Random Sick Day',
            'Stepped Out for Coffee',
            'Switched to Another Branch',
            'In Another Meeting',
            'Dog Ate My Keyboard',
            'Internet Issues',
            'Zoom Froze',
            'BRB, Deploying',
            'Deep in Focus Mode',
            'Reviewing Architecture',
            'Learning New Framework',
            'Refactoring Legacy Code'
        ];

        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function getRandomHP() {
            return Math.floor(Math.random() * (150 - 50 + 1)) + 50; // Random HP between 50-150
        }

        function generateCardData(name) {
            const ability = getRandomItem(ABILITIES);
            return {
                name: name,
                hp: getRandomHP(),
                ability: ability.name,
                desc: ability.desc,
                bonus: getRandomItem(BONUSES),
                blocker: getRandomItem(BLOCKERS),
                escape: getRandomItem(ESCAPES)
            };
        }


        let selectedPeople = [];
        let isRolling = false;
        let currentShiny = null;
        let activeGroup = 'All';
        let searchQuery = '';

        function saveSelectedToLocalStorage() {
            const selectedNames = selectedPeople.map(p => p.name);
            localStorage.setItem('wheelOfPokemons_selected', JSON.stringify(selectedNames));
        }

        function loadSelectedFromLocalStorage() {
            const saved = localStorage.getItem('wheelOfPokemons_selected');
            if (saved) {
                try {
                    const selectedNames = JSON.parse(saved);
                    selectedPeople = PEOPLE_DATA.filter(p => selectedNames.includes(p.name));
                } catch (e) {
                    selectedPeople = [...PEOPLE_DATA];
                }
            } else {
                selectedPeople = [...PEOPLE_DATA];
            }
        }

        function saveGroupToLocalStorage() {
            localStorage.setItem('wheelOfPokemons_group', activeGroup);
        }

        function loadGroupFromLocalStorage() {
            const saved = localStorage.getItem('wheelOfPokemons_group');
            if (saved && (saved === 'All' || TEAM_GROUPS[saved] !== undefined)) {
                activeGroup = saved;
            }
        }

        function getVisiblePeople() {
            let people = PEOPLE_DATA;
            if (activeGroup !== 'All') {
                const members = TEAM_GROUPS[activeGroup] || [];
                people = people.filter(p => members.includes(p.name));
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                people = people.filter(p => p.name.toLowerCase().includes(q));
            }
            return people;
        }

        const CONFETTI_POKEMON_IDS = [1, 4, 7, 25, 39, 52, 54, 58, 79, 94, 104, 129, 133, 143, 147, 151, 172, 183, 196, 197, 280, 359, 448];

        function getPokemonSpriteUrl(id) {
            return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
        }

        function renderPokemonConfetti() {
            const confettiContainer = document.getElementById('pokemonConfetti');
            if (!confettiContainer) return;

            confettiContainer.innerHTML = '';
            const count = 20;

            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = `${Math.random() * 92}%`;
                piece.style.width = `${34 + Math.random() * 28}px`;
                piece.style.height = `${34 + Math.random() * 28}px`;
                piece.style.setProperty('--fall-delay', `${(Math.random() * 0.9).toFixed(2)}s`);
                piece.style.setProperty('--fall-duration', `${(3.6 + Math.random() * 2.2).toFixed(2)}s`);
                piece.style.setProperty('--drift-x', `${Math.round((Math.random() - 0.5) * 180)}px`);
                piece.style.setProperty('--spin', `${Math.round((Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 540))}deg`);
                piece.style.setProperty('--confetti-scale', `${(0.85 + Math.random() * 0.9).toFixed(2)}`);

                const img = document.createElement('img');
                const pokemonId = CONFETTI_POKEMON_IDS[Math.floor(Math.random() * CONFETTI_POKEMON_IDS.length)];
                img.src = getPokemonSpriteUrl(pokemonId);
                img.alt = '';

                piece.appendChild(img);
                confettiContainer.appendChild(piece);
            }
        }

        function createPokemonBackground() {
            const pokemonIds = [1, 4, 7, 25, 39, 54, 104, 133, 143, 147, 151, 172, 175, 183, 196, 197, 280, 352, 359, 448]; // Popular pokemon IDs
            const positions = [
                { top: '5%', left: '5%', size: 120 },
                { top: '15%', right: '8%', size: 100 },
                { top: '40%', left: '3%', size: 80 },
                { top: '60%', right: '5%', size: 110 },
                { top: '75%', left: '10%', size: 90 },
                { top: '25%', left: '50%', size: 70 },
                { top: '85%', right: '15%', size: 95 },
                { top: '50%', left: '92%', size: 85 },
                // Nowe pozycje
                { top: '10%', left: '25%', size: 75 },
                { top: '30%', right: '20%', size: 105 },
                { top: '55%', left: '15%', size: 65 },
                { top: '70%', right: '30%', size: 85 },
                { top: '90%', left: '40%', size: 95 },
                { top: '20%', right: '40%', size: 70 },
                { top: '45%', left: '60%', size: 80 },
                { top: '80%', right: '50%', size: 90 }
            ];

            positions.forEach((pos, index) => {
                const div = document.createElement('div');
                div.className = 'pokemon-bg';
                div.style.top = pos.top;
                if (pos.left) div.style.left = pos.left;
                if (pos.right) div.style.right = pos.right;
                div.style.width = pos.size + 'px';
                div.style.height = pos.size + 'px';
                
                const randomPokemon = pokemonIds[Math.floor(Math.random() * pokemonIds.length)];
                const img = document.createElement('img');
                img.src = getPokemonSpriteUrl(randomPokemon);
                img.alt = '';
                
                div.appendChild(img);
                document.body.appendChild(div);
            });
        }

        function getAvatarUrl(name) {
            const lowercaseName = name.toLowerCase();
            return `./${lowercaseName}.png`;
        }

        function getPickedMediaCandidates(name) {
            const lowercaseName = name.toLowerCase();
            return [
                { type: 'image', src: `./${lowercaseName}_picked.gif` },
                { type: 'video', src: `./${lowercaseName}_picked.mp4` },
                { type: 'video', src: `./${lowercaseName}_picked.webm` },
                { type: 'image', src: getAvatarUrl(name) }
            ];
        }

        function canLoadMedia(candidate) {
            return new Promise(resolve => {
                if (candidate.type === 'image') {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = candidate.src;
                    return;
                }

                const video = document.createElement('video');
                video.preload = 'metadata';
                const done = (result) => {
                    video.removeAttribute('src');
                    video.load();
                    resolve(result);
                };
                video.onloadeddata = () => done(true);
                video.onerror = () => done(false);
                video.src = candidate.src;
            });
        }

        async function getPickedMedia(name) {
            const candidates = getPickedMediaCandidates(name);
            for (const candidate of candidates) {
                if (await canLoadMedia(candidate)) {
                    return candidate;
                }
            }
            return { type: 'image', src: getAvatarUrl(name) };
        }

        async function showWinnerReveal(name) {
            const overlay = document.getElementById('winnerOverlay');
            const mediaContainer = document.getElementById('winnerMedia');
            const winnerName = document.getElementById('winnerName');

            winnerName.textContent = name;
            mediaContainer.innerHTML = '';
            overlay.classList.remove('reveal');
            overlay.classList.add('active', 'throwing');
            overlay.setAttribute('aria-hidden', 'false');

            const media = await getPickedMedia(name);
            const mediaEl = document.createElement(media.type === 'video' ? 'video' : 'img');
            mediaEl.src = media.src;
            mediaEl.alt = `${name} selected`;

            if (media.type === 'video') {
                mediaEl.autoplay = true;
                mediaEl.loop = false;
                mediaEl.muted = true;
                mediaEl.playsInline = true;
                mediaEl.addEventListener('ended', () => {
                    mediaEl.pause();
                    const safeLastFrame = Math.max((mediaEl.duration || 0) - 0.04, 0);
                    if (Number.isFinite(safeLastFrame)) {
                        try {
                            mediaEl.currentTime = safeLastFrame;
                        } catch (error) {
                            // ignore seek edge cases and keep the ended frame visible
                        }
                    }
                }, { once: true });
            }

            mediaContainer.appendChild(mediaEl);
            renderPokemonConfetti();

            window.clearTimeout(window.__winnerRevealTimer);
            window.__winnerRevealTimer = window.setTimeout(() => {
                overlay.classList.add('reveal');
            }, 950);
        }

        function closeWinnerReveal() {
            const overlay = document.getElementById('winnerOverlay');
            const mediaContainer = document.getElementById('winnerMedia');
            overlay.classList.remove('active', 'throwing', 'reveal');
            overlay.setAttribute('aria-hidden', 'true');
            mediaContainer.innerHTML = '';
        }

        function renderGroupFilters() {
            const container = document.getElementById('groupFilters');
            const groups = ['All', ...Object.keys(TEAM_GROUPS)];
            container.innerHTML = groups.map(g =>
                `<span class="group-pill ${g === activeGroup ? 'active' : ''}" data-group="${g}">${g}</span>`
            ).join('');
        }

        function renderPersonList() {
            const listContainer = document.getElementById('personList');
            const visible = getVisiblePeople();

            if (visible.length === 0) {
                listContainer.innerHTML = '<div class="no-results">No people found</div>';
                return;
            }

            listContainer.innerHTML = visible.map(person => `
                <div class="person-item">
                    <input type="checkbox"
                           id="person-${person.name}"
                           ${selectedPeople.find(p => p.name === person.name) ? 'checked' : ''}
                           onchange="togglePerson('${person.name}')">
                    <label for="person-${person.name}" style="cursor: pointer; flex: 1;">
                        ${person.name}
                    </label>
                </div>
            `).join('');
        }

        function togglePerson(name) {
            const person = PEOPLE_DATA.find(p => p.name === name);
            const index = selectedPeople.findIndex(p => p.name === name);
            
            if (index === -1) {
                selectedPeople.push(person);
            } else {
                selectedPeople.splice(index, 1);
            }
            
            saveSelectedToLocalStorage();
            renderCards();
        }

        function createSparkles(card) {
            const sparkleCount = 20;
            for (let i = 0; i < sparkleCount; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.top = Math.random() * 100 + '%';
                sparkle.style.animationDelay = Math.random() * 1 + 's';
                card.appendChild(sparkle);
            }
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = selectedPeople.map(person => `
                <div class="pokemon-card" data-name="${person.name}">
                    <div class="card-header">
                        <div class="card-name">${person.name}</div>
                        <div class="card-hp">${person.hp}HP</div>
                    </div>
                    <div class="card-image">
                        <img src="${getAvatarUrl(person.name)}" alt="${person.name}">
                    </div>
                    <div class="card-ability">
                        <div class="ability-name">${person.ability}</div>
                        <div class="ability-desc">${person.desc}</div>
                    </div>
                    <div class="card-stats">
                        <span class="stat-badge">⚡ ${person.bonus}</span>
                    </div>
                    <div class="card-footer">
                        <div>Blocker: ${person.blocker}</div>
                        <div>Escape: ${person.escape}</div>
                    </div>
                </div>
            `).join('');
        }

        async function pickShinyPokemon() {
            if (isRolling || selectedPeople.length === 0) return;
            
            isRolling = true;
            document.getElementById('pickButton').disabled = true;

            // Reset previous shiny
            if (currentShiny) {
                const prevCard = document.querySelector(`[data-name="${currentShiny}"]`);
                if (prevCard) {
                    prevCard.classList.remove('shiny');
                    const sparkles = prevCard.querySelectorAll('.sparkle');
                    sparkles.forEach(s => s.remove());
                    // Reset to normal avatar
                    const prevImg = prevCard.querySelector('.card-image img');
                    prevImg.src = getAvatarUrl(currentShiny);
                }
            }
            currentShiny = null;

            // Rolling animation
            const cards = document.querySelectorAll('.pokemon-card');
            const rollDuration = 3000;
            const rollInterval = 150;
            const rollSteps = rollDuration / rollInterval;
            
            for (let i = 0; i < rollSteps; i++) {
                const randomCard = cards[Math.floor(Math.random() * cards.length)];
                cards.forEach(c => c.classList.remove('rolling'));
                randomCard.classList.add('rolling');
                await new Promise(resolve => setTimeout(resolve, rollInterval));
            }

            // Pick winner
            const winner = selectedPeople[Math.floor(Math.random() * selectedPeople.length)];
            const winnerCard = document.querySelector(`[data-name="${winner.name}"]`);
            
            cards.forEach(c => c.classList.remove('rolling'));
            winnerCard.classList.add('shiny');
            createSparkles(winnerCard);
            currentShiny = winner.name;

            // Scroll to winner
            winnerCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            showWinnerReveal(winner.name);

            isRolling = false;
            document.getElementById('pickButton').disabled = false;
        }

        async function init() {
            // Load config from config.json; fall back to hardcoded defaults
            let people = _DEFAULT_PEOPLE;
            let groups = _DEFAULT_GROUPS;
            try {
                const res = await fetch('./config.json');
                if (res.ok) {
                    const cfg = await res.json();
                    if (cfg.people && cfg.people.length > 0) people = cfg.people;
                    if (cfg.groups) groups = cfg.groups;
                }
            } catch (e) { /* use defaults */ }

            PEOPLE_DATA = people.map(name => generateCardData(name));
            TEAM_GROUPS = groups;

            createPokemonBackground();
            loadSelectedFromLocalStorage();
            loadGroupFromLocalStorage();
            renderGroupFilters();
            renderPersonList();
            renderCards();

            document.getElementById('pickButton').addEventListener('click', pickShinyPokemon);
            document.getElementById('winnerClose').addEventListener('click', closeWinnerReveal);
            document.getElementById('winnerOverlay').addEventListener('click', (event) => {
                if (event.target.id === 'winnerOverlay') closeWinnerReveal();
            });

            document.getElementById('groupFilters').addEventListener('click', (e) => {
                const pill = e.target.closest('.group-pill');
                if (!pill) return;
                activeGroup = pill.dataset.group;
                saveGroupToLocalStorage();
                renderGroupFilters();
                renderPersonList();
            });

            document.getElementById('personSearch').addEventListener('input', (e) => {
                searchQuery = e.target.value.trim();
                renderPersonList();
            });

            document.getElementById('selectAllVisible').addEventListener('click', () => {
                const visible = getVisiblePeople();
                visible.forEach(person => {
                    if (!selectedPeople.find(p => p.name === person.name)) {
                        selectedPeople.push(person);
                    }
                });
                saveSelectedToLocalStorage();
                renderPersonList();
                renderCards();
            });

            document.getElementById('deselectAllVisible').addEventListener('click', () => {
                const visibleNames = new Set(getVisiblePeople().map(p => p.name));
                selectedPeople = selectedPeople.filter(p => !visibleNames.has(p.name));
                saveSelectedToLocalStorage();
                renderPersonList();
                renderCards();
            });

            window.togglePerson = togglePerson;
        }

        init();
    </script>
</body>
